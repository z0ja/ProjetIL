<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let text = "test 1 2 3 [|M7lc1UVf-VE:120] test 4 5 6"
        function getVignette(text){
            let ancien = ""
            let video = ""
            let time = ""
            let begin_video = false
            let begin_time = false
            for (let letter of text){
                console.log(letter)
                if(begin_time && letter == "]"){
                    begin_time = false
                }
                if(begin_time) {
                    time = time+letter
                }
                if(begin_video && letter == ":"){
                    begin_video = false
                    begin_time = true
                }
                if(begin_video){
                    video = video+letter
                }
                if(letter == "|" && ancien == "["){
                    begin_video = true
                }
                ancien = letter
            }
            
            return [video,time]
        }

        console.log(getVignette(text))
    </script>
</body>
</html>
