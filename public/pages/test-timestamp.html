<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let text = "test 1 2 3 [|M7lc1UVf-VE:120] test 4 5 6 [|B7lc1UVf-VE:90]"
        function getVignette(text){
            let ancien = ""
            let video = ""
            let time = ""
            let begin_video = false
            let begin_time = false
            let vignette = []
            for (let letter of text){
                if(begin_time && letter == "]"){
                    begin_time = false
                    vignette.push([video,Number(time)])
                    video = ""
                    time = ""
                }
                if(begin_time) {
                    time = time+letter
                }
                if(begin_video && letter == ":"){
                    begin_video = false
                    begin_time = true
                }
                if(begin_video){
                    video = video+letter
                }
                if(letter == "|" && ancien == "["){
                    begin_video = true
                }
                ancien = letter
            }
            
            return vignette
        }

        console.log(getVignette(text))
        console.log(text.replace("[|"+getVignette(text)[0][0]+":"+getVignette(text)[0][1]+"]","+++[|"+getVignette(text)[0][0]+":"+getVignette(text)[0][1]+"]+++"))
    </script>
</body>
</html>
